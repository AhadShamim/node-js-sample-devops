name: ci pipeline
on:
  push:
  pull_request:
jobs:
  build_test:
  runs-on: self-hosted
  steps:
    - name: checkout code
      uses: actions/checkout@v4
    - name: setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
    - name: install dependencies
      run: npm install
    - name: runn tests
      run: npm test || echo "NO  tests found" 



  
